name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./package-lock.json
      - name: Install
        run: npm ci
      - name: Unit (Vitest)
        run: npm run test:unit
      - name: Production build
        run: npm run build
        env:
          CI: true
          REACT_APP_FIREBASE_API_KEY: ci-placeholder
          REACT_APP_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID: ci-placeholder
          REACT_APP_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          REACT_APP_FIREBASE_APP_ID: "1:000000000000:web:cici"
